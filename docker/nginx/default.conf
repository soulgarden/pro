server {
    server_name soulgarden.pro;
    listen 8080;

    access_log /dev/stdout main;
    error_log /dev/stderr notice;

    root /var/www/pro;

    location / {
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
